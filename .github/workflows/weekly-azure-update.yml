name: "Weekly Azure Update Blog Post"

on:
  schedule:
    # Every Monday at 09:00 UTC
    - cron: "0 9 * * 1"
  # Allow manual runs from the Actions tab
  workflow_dispatch:

permissions:
  contents: write

jobs:
  create-blog-post:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install Python dependencies
        run: pip install requests

      - name: Fetch latest Azure Update video and create blog post
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: python scripts/fetch_azure_update.py

      - name: Commit and push new blog post (if any)
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add _posts/
          if git diff --staged --quiet; then
            echo "No new blog post — nothing to commit."
          else
            git commit -m "Add weekly Azure Update blog post [automated]"
            git push
          fi
